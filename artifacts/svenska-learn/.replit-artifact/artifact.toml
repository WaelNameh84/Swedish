kind = "web"
previewPath = "/"
title = "Svenska - تعلم السويدية"
version = "1.0.0"
id = "artifacts/svenska-learn"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24153

[services.development]
run = "pnpm --filter @workspace/svenska-learn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/svenska-learn", "run", "build" ]
serve = "static"
publicDir = "artifacts/svenska-learn/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24153"
BASE_PATH = "/"
