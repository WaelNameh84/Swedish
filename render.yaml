services:
  - type: web
    name: svenska-learn
    env: node
    plan: free
    region: frankfurt
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install --ignore-scripts &&
      pnpm rebuild esbuild tesseract.js ffmpeg-static &&
      pnpm --filter @workspace/db run push &&
      pnpm --filter @workspace/scripts run seed &&
      pnpm --filter @workspace/scripts run seed:dictionary &&
      pnpm --filter @workspace/scripts run seed:verbs &&
      pnpm --filter @workspace/scripts run seed:conversations &&
      pnpm --filter @workspace/scripts run seed:conversations:extra &&
      pnpm --filter @workspace/scripts run seed:verbs:extra &&
      pnpm --filter @workspace/scripts run seed:verbs:extra2 &&
      BASE_PATH=/ pnpm --filter @workspace/svenska-learn run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: >-
      pnpm --filter @workspace/db run push-force &&
      node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: svenska-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: SESSION_SECRET
        generateValue: true
      # Auth uses your own external Clerk project on Render (not Replit-managed
      # Clerk, which is bound to Replit's own domains). Get these from
      # https://dashboard.clerk.com -> your app -> API Keys, and add
      # https://<your-render-domain>.onrender.com to Clerk's allowed origins.
      # `sync: false` means Render will prompt you to enter the value in the
      # dashboard instead of storing it in this file.
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

databases:
  - name: svenska-db
    plan: free
    region: frankfurt
