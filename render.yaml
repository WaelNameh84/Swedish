services:
  - type: web
    name: svenska-learn
    env: node
    plan: free
    region: frankfurt
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install --ignore-scripts &&
      pnpm rebuild esbuild tesseract.js &&
      pnpm --filter @workspace/db run push &&
      pnpm --filter @workspace/scripts run seed &&
      pnpm --filter @workspace/scripts run seed:dictionary &&
      pnpm --filter @workspace/scripts run seed:verbs &&
      pnpm --filter @workspace/scripts run seed:conversations &&
      pnpm --filter @workspace/scripts run seed:conversations:extra &&
      pnpm --filter @workspace/scripts run seed:verbs:extra &&
      pnpm --filter @workspace/scripts run seed:verbs:extra2 &&
      BASE_PATH=/ pnpm --filter @workspace/svenska-learn run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: >-
      pnpm --filter @workspace/db run push-force &&
      node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: svenska-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: svenska-db
    plan: free
    region: frankfurt
